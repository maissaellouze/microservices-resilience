# ─────────────────────────────────────────────────────────────────────────────
# Nginx — Reverse Proxy, SSL/TLS, Cache HTTP, Rate Limiting, Load Balancer
# Architecture : Client → Nginx (443) → API Gateway (8080)
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Format de logs JSON pour observabilité ────────────────────────────────
    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"upstream":"$upstream_addr",'
        '"upstream_time":"$upstream_response_time",'
        '"request_time":"$request_time"}';

    access_log /var/log/nginx/access.log json_combined;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # ── Compression gzip ──────────────────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain application/xml;
    gzip_min_length 256;

    # ── Cache HTTP ────────────────────────────────────────────────────────────
    proxy_cache_path /var/cache/nginx
                     levels=1:2
                     keys_zone=api_cache:10m
                     max_size=100m
                     inactive=10m
                     use_temp_path=off;

    # ── Rate Limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

    # ── Upstream : API Gateway (load balancer round-robin) ────────────────────
    upstream api_gateway {
        least_conn;
        server api-gateway:8080 max_fails=3 fail_timeout=30s;
        # Ajouter des instances pour le load balancing horizontal :
        # server api-gateway-2:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ── Redirection HTTP → HTTPS ──────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── Serveur HTTPS principal ───────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name localhost;

        # ── SSL/TLS ───────────────────────────────────────────────────────────
        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Headers de sécurité ───────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options            DENY;
        add_header X-Content-Type-Options     nosniff;
        add_header X-XSS-Protection          "1; mode=block";
        add_header X-Request-ID              $request_id;

        # ── Route Auth (rate-limited, pas de cache) ───────────────────────────
        location /auth/ {
            limit_req zone=auth_limit burst=5 nodelay;

            proxy_pass         http://api_gateway;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $request_id;

            # Pas de cache pour les endpoints d'authentification
            proxy_no_cache 1;
            proxy_cache_bypass 1;

            proxy_connect_timeout 5s;
            proxy_read_timeout    10s;
        }

        # ── Route API Service A (avec cache GET) ──────────────────────────────
        location /api/service-a/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://api_gateway;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-ID      $request_id;

            # Cache GET uniquement
            proxy_cache        api_cache;
            proxy_cache_key    "$scheme$host$request_uri$http_authorization";
            proxy_cache_valid  200 30s;
            proxy_cache_valid  503 0s;
            proxy_cache_methods GET;
            proxy_cache_bypass $http_cache_control;
            add_header         X-Cache-Status $upstream_cache_status;

            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
        }

        # ── Route API Service B (paiements — pas de cache) ───────────────────
        location /api/service-b/ {
            limit_req zone=api_limit burst=10 nodelay;

            proxy_pass         http://api_gateway;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Jamais de cache pour les paiements
            proxy_no_cache     1;
            proxy_cache_bypass 1;

            proxy_connect_timeout  5s;
            proxy_read_timeout     60s;
            proxy_send_timeout     60s;
        }

        # ── Health check Nginx ────────────────────────────────────────────────
        location /nginx-health {
            access_log off;
            return 200 '{"status":"UP","component":"nginx"}';
            add_header Content-Type application/json;
        }
    }
}
