version: '3.9'

networks:
  resilience-net:
    driver: bridge

services:

  # ── Redis — Nécessaire pour le Rate Limiting de la Gateway ──────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    networks:
      - resilience-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Nginx — Reverse Proxy + SSL ─────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
      - nginx-logs:/var/log/nginx
    depends_on:
      - api-gateway
    networks:
      - resilience-net
    restart: unless-stopped

  # ── API Gateway — Spring Cloud Gateway ──────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - JWT_SECRET=mySecretKeyForJWTThatIsAtLeast256BitsLong!ChangeInProduction
    depends_on:
      auth-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - resilience-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Auth Service ────────────────────────────────────────────────────────────
  auth-service:
    build: ./auth-service
    container_name: auth-service
    environment:
      - JWT_SECRET=mySecretKeyForJWTThatIsAtLeast256BitsLong!ChangeInProduction
    networks:
      - resilience-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/actuator/health"]
      interval: 10s
      retries: 3

  # ── Service A & B ───────────────────────────────────────────────────────────
  service-a:
    build: ./service-a
    container_name: service-a
    networks:
      - resilience-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/actuator/health"]

  service-b:
    build: ./service-b
    container_name: service-b
    networks:
      - resilience-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/actuator/health"]

volumes:
  nginx-cache:
  nginx-logs: